<!-- Modified Login Page (login.html) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secured Client Login - NGREP</title>
<style>
body {
    margin: 0;
    padding: 20px 10px;
    font-family: 'Helvetica Neue', sans-serif;
    background-color: #f1f7f2;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}
.top-logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 10px;
}
.logo {
    width: 250px;
    height: auto;
    object-fit: contain;
}
.login-card {
    background: #fff;
    padding: 30px 20px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    text-align: center;
    width: 90%;
    max-width: 400px;
}
.login-card h2 {
    margin-bottom: 30px;
    font-size: 24px;
    color: #495c3d;
}
form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
input[type="email"],
input[type="password"] {
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
}
button {
    padding: 12px;
    background-color: #495c3d;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s ease;
}
button:hover {
    background-color: #3d4f34;
}
.signup-text {
    margin-top: 20px;
    font-size: 14px;
    color: #555;
}
.signup-text a {
    color: #4a90e2;
    text-decoration: none;
    font-weight: bold;
}
.signup-text a:hover {
    text-decoration: underline;
}
.contact-text {
    margin-top: 20px;
    font-size: 14px;
    color: #555;
}
.contact-text a {
    color: #4a90e2;
    text-decoration: none;
    font-weight: bold;
}
.contact-text a:hover {
    text-decoration: underline;
}
footer {
    margin-top: 40px;
    font-size: 12px;
    color: #999;
    text-align: center;
}
.error-message {
    color: #dc3545;
    margin-bottom: 15px;
    font-size: 14px;
    display: none;
}
@media (max-width: 600px) {
    .top-logos {
        flex-direction: column;
        gap: 10px;
    }
    
    .logo {
        width: 200px;
    }
    
    .login-card h2 {
        font-size: 20px;
        margin-bottom: 20px;
    }
    
    input[type="email"],
    input[type="password"] {
        padding: 10px;
        font-size: 14px;
    }
    
    button {
        padding: 10px;
        font-size: 16px;
    }
}

@media (max-width: 350px) {
    .logo {
        width: 150px;
    }
    
    .login-card {
        padding: 20px 15px;
    }
}
input[type="email"],
input[type="password"] {
    width: 100%;
    box-sizing: border-box;
}

form {
    width: 100%;
}

</style>
</head>
<body>
<div class="top-logos">
    <img src="sspl_logo.png" alt="System Strategy and Policy Lab" class="logo">
    <img src="ngrep_logo.PNG" alt="NGREP Logo" class="logo">
</div>
<div class="login-card">
    <h2>Secured Client Login</h2>
    <div class="error-message" id="errorMessage"></div>
    <form id="loginForm" onsubmit="return loginUser(event)">
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p class="signup-text">
        Don't Have an Account? <a href="register.html">Sign-up</a><br>
        or Contact your Department Administrator to enroll you
    </p>
    <p class="contact-text">
        Having Issue? <a href="contact-us.html">Contact us</a>
    </p>
</div>
<footer>
    Copyright © 2025 SStrategyLab. | All rights reserved
</footer>

<script>
    function loginUser(event) {
        event.preventDefault();
        
        // Get form values
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Error message element
        const errorMessage = document.getElementById('errorMessage');
        
        // Reset error message
        errorMessage.style.display = 'none';
        
        // Get users from localStorage
        const users = JSON.parse(localStorage.getItem('ngrepUsers')) || [];
        
        // Find user with matching email and password
        const user = users.find(u => u.email === email && u.password === password);
        
        if (!user) {
            errorMessage.textContent = 'Invalid email or password';
            errorMessage.style.display = 'block';
            return false;
        }
        
        // Store current user info in session storage
        sessionStorage.setItem('currentUser', JSON.stringify({
            fullName: user.fullName,
            email: user.email,
            state: user.state,
            mdas: user.mdas
        }));
        
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
        
        return false;
    }
    
    // Check if user is already logged in
    window.onload = function() {
        const currentUser = sessionStorage.getItem('currentUser');
        if (currentUser) {
            // User is already logged in, redirect to dashboard
            window.location.href = 'dashboard.html';
        }
    };
</script>
</body>
</html>
